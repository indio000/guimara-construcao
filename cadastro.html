<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guimara Construção - Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Guimara Construção</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="servicos.html">Serviços</a>
            <a href="clientes.html">Clientes</a>
            <a href="cadastro.html">Cadastro</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>
    <main>
        <h2>Cadastro de Cliente</h2>
        <form id="cadastroForm">
            <label>Nome Completo:</label>
            <input type="text" required>
            <label>Telefone:</label>
            <input type="tel" value="(46) 99901-1578" required>
            <label>Endereço:</label>
            <input type="text" required>
            <label>Tipo de Serviço:</label>
            <select required>
                <option value="">Selecione...</option>
                <option>Reformas</option>
                <option>Alvenaria</option>
                <option>Pisos e Revestimentos</option>
                <option>Lajes e Coberturas</option>
            </select>
            <label>Descrição do Projeto:</label>
            <textarea required></textarea>
            <button type="submit">Cadastrar Cliente</button>
        </form>
    </main>
    <script>
        document.getElementById('cadastroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Cadastro realizado com sucesso! Entraremos em contato em breve.');
        });
    </script>
</body>
</html>
